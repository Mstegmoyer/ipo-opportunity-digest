name: weekly-digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

env:
  # Opt-in to Node.js 24 for JavaScript-based actions ahead of Node 20 removal.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Render digest scaffold
        run: python -m src.main --dry-run > /tmp/digest.html
